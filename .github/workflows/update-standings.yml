name: Update Golf Pool Standings

on:
  push:
    paths:
      - 'results/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl xlrd

      - name: Generate standings JSON
        run: python scripts/generate_standings.py

      - name: Commit and push updated standings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/standings.json
          git diff --cached --quiet || git commit -m "Update standings [automated]"
          git push
