<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>2026 Golf Pool Standings</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--surface3:#2d333b;
  --border:#30363d;--border-soft:#21262d;
  --green:#238636;--green-bright:#2ea043;--green-glow:rgba(35,134,54,.18);
  --gold:#d4a30a;--gold-dim:rgba(212,163,10,.15);
  --major:#1f6feb;--major-dim:rgba(31,111,235,.12);--major-bright:#58a6ff;
  --small:#8957e5;--small-dim:rgba(137,87,229,.12);
  --red:#da3633;--red-dim:rgba(218,54,51,.12);
  --text:#e6edf3;--text-muted:#7d8590;--text-dim:#484f58;
  --rank1:#ffd700;--rank2:#c0c0c0;--rank3:#cd7f32;
  --penalty-bg:rgba(218,54,51,.09);
  --radius:8px;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(35,134,54,.07) 0%,transparent 60%),
             radial-gradient(ellipse 40% 30% at 90% 80%,rgba(31,111,235,.04) 0%,transparent 50%);
  pointer-events:none}

/* ── Layout ── */
.page{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:0 20px 60px}

/* ── Header ── */
header{padding:32px 0 22px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--border);margin-bottom:22px}
.header-left{display:flex;align-items:center;gap:14px}
.logo{width:46px;height:46px;background:var(--green);border-radius:10px;display:grid;place-items:center;font-size:24px;box-shadow:0 0 20px var(--green-glow);flex-shrink:0}
.header-titles h1{font-family:var(--font-display);font-size:clamp(24px,3.5vw,42px);letter-spacing:2px;line-height:1}
.header-titles p{font-size:12px;color:var(--text-muted);margin-top:3px;font-weight:300;letter-spacing:.4px}
.updated-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);white-space:nowrap}
.updated-badge span{color:var(--green-bright)}

/* ── Nav tabs (Overall / Seg / Majors / Small) ── */
.tab-bar{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px}
.tab{padding:7px 14px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:all .15s;letter-spacing:.3px;white-space:nowrap}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{background:var(--green);color:#fff;box-shadow:0 0 12px var(--green-glow)}
.tab.major-tab.active{background:var(--major);box-shadow:0 0 12px rgba(31,111,235,.3)}
.tab.small-tab.active{background:var(--small);box-shadow:0 0 12px rgba(137,87,229,.3)}

/* ── View toggle (Overview / Details) ── */
.view-toggle{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:6px;overflow:hidden;width:fit-content}
.vtab{padding:7px 20px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:var(--surface2);color:var(--text-muted);transition:all .15s;letter-spacing:.3px}
.vtab:first-child{border-right:1px solid var(--border)}
.vtab.active{background:var(--surface3);color:var(--text)}
.vtab:hover:not(.active){color:var(--text)}

/* ── Controls row ── */
.controls{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}

/* ── Legend ── */
.legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--text-muted)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:9px;height:9px;border-radius:2px}

/* ── Table wrapper ── */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface)}

/* ── Table ── */
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--surface2);color:var(--text-muted);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.7px;padding:9px 10px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:10}
thead th.col-rank{width:40px}
thead th.col-entry{text-align:left;min-width:155px;position:sticky;left:0;z-index:11;background:var(--surface2)}
thead th.col-total{min-width:120px}
thead th.col-behind{min-width:110px}
thead th.col-cuts{min-width:90px}
thead th.col-tourn{min-width:88px}
thead th.major-col{background:rgba(31,111,235,.15);color:#7db9f7}
thead th.small-col{background:rgba(137,87,229,.15);color:#b69fe8}
.th-inner{display:flex;flex-direction:column;align-items:center;gap:2px}
.th-name{font-size:10px;white-space:normal;line-height:1.2;text-align:center}
.th-date{font-size:9px;color:var(--text-dim);font-family:var(--font-mono)}
.th-badge{font-size:8px;padding:1px 4px;border-radius:3px;letter-spacing:.4px;margin-top:1px}
.th-badge.major{background:var(--major);color:#fff}
.th-badge.small{background:var(--small);color:#fff}
.th-badge.mult{background:var(--gold);color:#000}

tbody tr{border-bottom:1px solid var(--border-soft);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody tr:last-child{border-bottom:none}
tbody tr:nth-child(even) td{background:rgba(255,255,255,.01)}
tbody tr:nth-child(even) td.sticky-col{background:rgba(22,27,34,.97)}

td{padding:8px 10px;text-align:center;vertical-align:middle}

/* Rank */
td.rank-cell{font-family:var(--font-display);font-size:17px;letter-spacing:.5px;width:40px}
.rank-1{color:var(--rank1);text-shadow:0 0 10px rgba(255,215,0,.35)}
.rank-2{color:var(--rank2)}
.rank-3{color:var(--rank3)}

/* Entry */
td.entry-cell{text-align:left;position:sticky;left:0;z-index:5;background:var(--surface);border-right:1px solid var(--border);padding-left:14px}
.entry-name-btn{background:none;border:none;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--major-bright);text-decoration:none;padding:0;transition:color .15s;text-align:left}
.entry-name-btn:hover{color:#fff;text-decoration:underline}

/* Winner badge */
.winner-badge{display:inline-block;font-size:9px;font-weight:600;background:var(--gold);color:#000;border-radius:3px;padding:1px 5px;margin-left:6px;letter-spacing:.5px;vertical-align:middle}

/* Total */
td.total-cell{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--green-bright);border-left:1px solid var(--border)}
td.total-cell.negative{color:var(--red)}

/* Behind */
td.behind-cell{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
td.behind-cell.leader{color:var(--green-bright);font-weight:500}

/* Cuts */
td.cuts-cell{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}

/* Score cells */
td.score-cell{font-family:var(--font-mono);font-size:11px;cursor:default;position:relative}
td.score-penalty{background:var(--penalty-bg);color:var(--red)}
td.score-upcoming{color:var(--text-dim)}
td.score-major{background:var(--major-dim)}
td.score-major.score-penalty{background:rgba(218,54,51,.14)}
td.score-small{background:var(--small-dim)}

/* Podium rows */
tr.podium-1 td.entry-cell{border-left:3px solid var(--rank1)}
tr.podium-2 td.entry-cell{border-left:3px solid var(--rank2)}
tr.podium-3 td.entry-cell{border-left:3px solid var(--rank3)}

/* ── Tooltip ── */
.has-tip{position:relative}
.has-tip .tip{
  display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#1c2128;border:1px solid var(--border);color:var(--text);
  font-size:11px;white-space:nowrap;padding:5px 10px;border-radius:5px;
  pointer-events:none;z-index:200;font-family:var(--font-mono);
  box-shadow:0 4px 16px rgba(0,0,0,.5);line-height:1.5
}
.has-tip:hover .tip{display:block}

/* ── Modal ── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;backdrop-filter:blur(3px);align-items:center;justify-content:center;padding:20px}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:760px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0}
.modal-entry{font-family:var(--font-display);font-size:28px;letter-spacing:1px;color:var(--text)}
.modal-sub{font-size:12px;color:var(--text-muted);margin-top:3px}
.modal-stats{display:flex;gap:20px;margin-top:10px;flex-wrap:wrap}
.modal-stat{text-align:center}
.modal-stat .val{font-family:var(--font-mono);font-size:14px;font-weight:500;color:var(--green-bright)}
.modal-stat .lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px 10px;transition:all .15s;flex-shrink:0}
.modal-close:hover{color:var(--text);background:var(--surface3)}
.modal-body{overflow-y:auto;padding:0}
.modal-table{width:100%;border-collapse:collapse;font-size:12px}
.modal-table thead th{background:var(--surface2);color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:.7px;padding:8px 14px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0}
.modal-table thead th:last-child{text-align:right}
.modal-table thead th:nth-child(3),.modal-table thead th:nth-child(4){text-align:center}
.modal-table tbody tr{border-bottom:1px solid var(--border-soft)}
.modal-table tbody tr:hover{background:rgba(255,255,255,.02)}
.modal-table tbody tr:last-child{border-bottom:none}
.modal-table td{padding:9px 14px;vertical-align:middle}
.modal-table td.tourn-name{font-size:12px;color:var(--text);font-weight:500}
.modal-table td.tourn-golfer{color:var(--text-muted);font-size:12px}
.modal-table td.tourn-pos{text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
.modal-table td.tourn-pts{text-align:right;font-family:var(--font-mono);font-size:12px;font-weight:500}
.modal-table td.tourn-pts.positive{color:var(--green-bright)}
.modal-table td.tourn-pts.penalty{color:var(--red)}
.modal-table td.tourn-pts.upcoming{color:var(--text-dim)}
.modal-table .major-row td{background:rgba(31,111,235,.06)}
.modal-table .penalty-row td{background:var(--penalty-bg)}
.tourn-badge{font-size:9px;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle}
.tourn-badge.major{background:var(--major);color:#fff}
.tourn-badge.small{background:var(--small);color:#fff}
.modal-total-row td{font-weight:600;border-top:2px solid var(--border);background:var(--surface2)!important;font-family:var(--font-mono)}

/* ── States ── */
.state-box{text-align:center;padding:70px 20px;color:var(--text-muted)}
.state-box .icon{font-size:36px;margin-bottom:14px}
.state-box h3{font-size:17px;margin-bottom:6px;color:var(--text)}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Animations ── */
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.row-enter{animation:rowIn .2s ease backwards}
@keyframes rowIn{from{opacity:0}to{opacity:1}}

@media(max-width:640px){
  header{flex-direction:column;align-items:flex-start}
  .tab{font-size:11px;padding:5px 9px}
}
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="header-left">
      <div class="logo">⛳</div>
      <div class="header-titles">
        <h1>2026 Golf Pool</h1>
        <p>One-and-Done · 29 Tournaments · Season Standings</p>
      </div>
    </div>
    <div class="updated-badge" id="updated-badge">Loading…</div>
  </header>

  <!-- Nav tabs -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab active" data-view="overall">Overall</button>
    <button class="tab" data-view="seg1">Seg 1</button>
    <button class="tab" data-view="seg2">Seg 2</button>
    <button class="tab" data-view="seg3">Seg 3</button>
    <button class="tab" data-view="seg4">Seg 4</button>
    <button class="tab" data-view="seg5">Seg 5</button>
    <button class="tab" data-view="seg6">Seg 6</button>
    <button class="tab major-tab" data-view="majors">★ Majors</button>
    <button class="tab small-tab" data-view="small">Small Purse</button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="view-toggle">
      <button class="vtab active" data-vtab="overview">Overview</button>
      <button class="vtab" data-vtab="details">Details</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--major)"></div>Major (1.5×)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--small)"></div>Small Purse</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Penalty / Miss / No Pick</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--surface2)"></div>Upcoming</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div id="table-container">
      <div class="state-box">
        <div class="spinner"></div>
        <h3>Loading Standings</h3>
        <p>Fetching tournament data…</p>
      </div>
    </div>
  </div>

</div>

<!-- Entry detail modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-entry" id="modal-entry-name">—</div>
        <div class="modal-sub" id="modal-view-label">—</div>
        <div class="modal-stats" id="modal-stats"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <table class="modal-table">
        <thead>
          <tr>
            <th>Tournament</th>
            <th>Golfer Selected</th>
            <th style="text-align:center">Finish</th>
            <th style="text-align:right">Score</th>
          </tr>
        </thead>
        <tbody id="modal-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let DATA        = null;
let activeView  = 'overall';
let activeVTab  = 'overview';  // 'overview' | 'details'

const VIEW_LABELS = {
  overall:'Overall Season', seg1:'Segment 1 (Jan–Feb)',
  seg2:'Segment 2 (Mar–Apr)', seg3:'Segment 3 (Apr–May)',
  seg4:'Segment 4 (May–Jun)', seg5:'Segment 5 (Jun–Jul)',
  seg6:'Segment 6 (Jul–Aug)', majors:'Major Championships',
  small:'Small Purse Tournaments',
};

const VIEW_FILTER = {
  overall: t => true,
  seg1: t => t.seg===1, seg2: t => t.seg===2,
  seg3: t => t.seg===3, seg4: t => t.seg===4,
  seg5: t => t.seg===5, seg6: t => t.seg===6,
  majors: t => t.major, small:  t => t.small,
};

// ── Formatting ────────────────────────────────────────────────────────────
function fmtDollars(n, showSign=false) {
  if (n === null || n === undefined) return '—';
  const abs = Math.abs(n);
  const s   = '$' + Math.round(abs).toLocaleString('en-US');
  if (n < 0)       return `(${s})`;
  if (showSign&&n>0) return `+${s}`;
  return s;
}

function fmtBehind(n) {
  if (n === 0) return '—';
  const abs = Math.abs(n);
  return '(' + '$' + Math.round(abs).toLocaleString('en-US') + ')';
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  if (!DATA) return;
  const tourns     = DATA.tournaments.filter(VIEW_FILTER[activeView]);
  const rows       = DATA.standings[activeView];
  const completed  = DATA.completed_segs[activeView] || false;
  const isOverall  = activeView === 'overall';

  if (activeVTab === 'overview') renderOverview(rows, tourns, completed, isOverall);
  else                           renderDetails(rows, tourns, completed, isOverall);
}

function podiumClass(rank, isOverall) {
  if (!isOverall) return '';
  return rank <= 3 ? `podium-${rank}` : '';
}

function renderOverview(rows, tourns, completed, isOverall) {
  let html = `<table class="fade-in">
  <thead><tr>
    <th class="col-rank">Rank</th>
    <th class="col-entry">Entry Name</th>
    <th class="col-total">Total Score</th>
    <th class="col-behind">Behind Leader</th>
    <th class="col-cuts">Cuts Made</th>
  </tr></thead><tbody>`;

  rows.forEach((row, ri) => {
    const pc    = podiumClass(row.rank, isOverall);
    const delay = Math.min(ri * 12, 280);
    const isWinner = !isOverall && completed && row.rank === 1;
    const totNeg = row.total < 0;

    html += `<tr class="${pc} row-enter" style="animation-delay:${delay}ms">
      <td class="rank-cell ${isOverall && row.rank<=3 ? `rank-${row.rank}` : ''}">${row.rank}</td>
      <td class="entry-cell sticky-col">
        <button class="entry-name-btn" onclick="openModal('${row.entry}')">${row.entry}</button>
        ${isWinner ? '<span class="winner-badge">WINNER</span>' : ''}
      </td>
      <td class="total-cell ${totNeg?'negative':''}">${fmtDollars(row.total)}</td>
      <td class="behind-cell ${row.behind===0?'leader':''}">${row.behind===0?'Leader':fmtBehind(row.behind)}</td>
      <td class="cuts-cell">${row.cuts_made} / ${row.total_played}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('table-container').innerHTML = html;
}

function renderDetails(rows, tourns, completed, isOverall) {
  let html = `<table class="fade-in"><thead><tr>
    <th class="col-rank">Rank</th>
    <th class="col-entry">Entry Name</th>`;

  tourns.forEach(t => {
    const cls = t.major ? 'major-col' : t.small ? 'small-col' : '';
    html += `<th class="col-tourn ${cls}"><div class="th-inner">
      <span class="th-name">${t.short}</span>
      <span class="th-date">${t.date}</span>`;
    if (t.major)    html += `<span class="th-badge major">MAJOR ${t.wt}×</span>`;
    else if (t.small) html += `<span class="th-badge small">SMALL</span>`;
    html += `</div></th>`;
  });

  html += `<th class="col-total">Total Score</th></tr></thead><tbody>`;

  rows.forEach((row, ri) => {
    const pc    = podiumClass(row.rank, isOverall);
    const delay = Math.min(ri * 12, 280);
    const isWinner = !isOverall && completed && row.rank === 1;
    const totNeg = row.total < 0;

    html += `<tr class="${pc} row-enter" style="animation-delay:${delay}ms">
      <td class="rank-cell ${isOverall && row.rank<=3 ? `rank-${row.rank}` : ''}">${row.rank}</td>
      <td class="entry-cell sticky-col">
        <button class="entry-name-btn" onclick="openModal('${row.entry}')">${row.entry}</button>
        ${isWinner ? '<span class="winner-badge">WINNER</span>' : ''}
      </td>`;

    row.scores.forEach((sc, ti) => {
      const t = tourns[ti];
      if (!t) return;
      let tdCls = 'score-cell';
      let val   = '·';
      let tipContent = '';

      if (sc.status === 'upcoming') {
        tdCls += ' score-upcoming';
      } else if (sc.status === 'penalty') {
        tdCls += ' score-penalty';
        if (t.major) tdCls += ' score-major';
        val = fmtDollars(sc.points);
        const golferStr = sc.golfer ? sc.golfer : 'No Pick';
        const posStr    = sc.position ? ` · T${sc.position}` : '';
        tipContent = `${golferStr}${posStr}`;
      } else {
        if (t.major) tdCls += ' score-major';
        else if (t.small) tdCls += ' score-small';
        val = fmtDollars(sc.points);
        const posStr = sc.position ? `T${sc.position}` : '';
        tipContent = `${sc.golfer || '—'}${posStr ? ' · ' + posStr : ''}`;
      }

      if (tipContent) {
        html += `<td class="${tdCls} has-tip">${val}<span class="tip">${tipContent}</span></td>`;
      } else {
        html += `<td class="${tdCls}">${val}</td>`;
      }
    });

    html += `<td class="total-cell ${totNeg?'negative':''}">${fmtDollars(row.total)}</td></tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('table-container').innerHTML = html;
}

// ── Modal ─────────────────────────────────────────────────────────────────
function openModal(entry) {
  if (!DATA) return;
  const tourns  = DATA.tournaments.filter(VIEW_FILTER[activeView]);
  const rows    = DATA.standings[activeView];
  const row     = rows.find(r => r.entry === entry);
  if (!row) return;

  document.getElementById('modal-entry-name').textContent = entry;
  document.getElementById('modal-view-label').textContent = VIEW_LABELS[activeView];

  // Stats bar
  const totNeg = row.total < 0;
  document.getElementById('modal-stats').innerHTML = `
    <div class="modal-stat">
      <div class="val ${totNeg?'negative':''}" style="${totNeg?'color:var(--red)':''}">${fmtDollars(row.total)}</div>
      <div class="lbl">Total Score</div>
    </div>
    <div class="modal-stat">
      <div class="val">${row.rank}</div>
      <div class="lbl">Rank</div>
    </div>
    <div class="modal-stat">
      <div class="val">${row.cuts_made} / ${row.total_played}</div>
      <div class="lbl">Cuts Made</div>
    </div>`;

  let tbodyHtml = '';
  let runTotal  = 0;

  row.scores.forEach((sc, ti) => {
    const t = tourns[ti];
    if (!t) return;

    const majorRow   = t.major   ? 'major-row'   : '';
    const penaltyRow = sc.status === 'penalty' ? 'penalty-row' : '';

    let golferStr = '—';
    let posStr    = '—';
    let ptsStr    = '—';
    let ptsCls    = 'upcoming';

    if (sc.status === 'upcoming') {
      golferStr = '<em style="color:var(--text-dim)">Upcoming</em>';
      posStr    = '—';
      ptsStr    = '—';
    } else if (sc.status === 'penalty') {
      golferStr = sc.golfer
        ? `<span style="color:var(--text-muted)">${sc.golfer}</span>`
        : '<span style="color:var(--red);font-style:italic">No Pick</span>';
      posStr  = sc.position ? `T${sc.position}` : '—';
      ptsStr  = fmtDollars(sc.points);
      ptsCls  = 'penalty';
      runTotal += sc.points;
    } else {
      golferStr = sc.golfer || '—';
      posStr    = sc.position ? `T${sc.position}` : '—';
      ptsStr    = fmtDollars(sc.points);
      ptsCls    = 'positive';
      runTotal  += sc.points;
    }

    const majorBadge = t.major ? '<span class="tourn-badge major">MAJOR</span>' : '';
    const smallBadge = t.small ? '<span class="tourn-badge small">SMALL</span>' : '';

    tbodyHtml += `<tr class="${majorRow} ${penaltyRow}">
      <td class="tourn-name">${t.name}${majorBadge}${smallBadge}</td>
      <td class="tourn-golfer">${golferStr}</td>
      <td class="tourn-pos">${posStr}</td>
      <td class="tourn-pts ${ptsCls}">${ptsStr}</td>
    </tr>`;
  });

  // Total row
  tbodyHtml += `<tr class="modal-total-row">
    <td colspan="3" style="color:var(--text-muted);text-transform:uppercase;font-size:10px;letter-spacing:.7px">Total</td>
    <td class="tourn-pts ${runTotal<0?'penalty':'positive'}" style="font-size:13px">${fmtDollars(runTotal)}</td>
  </tr>`;

  document.getElementById('modal-tbody').innerHTML = tbodyHtml;
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ── Tab switching ─────────────────────────────────────────────────────────
document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeView = btn.dataset.view;
  render();
});

document.querySelectorAll('.vtab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.vtab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeVTab = btn.dataset.vtab;
    render();
  });
});

// ── Load ──────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('data/standings.json?v=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    DATA = await res.json();
    document.getElementById('updated-badge').innerHTML =
      `Updated <span>${DATA.generated}</span>`;
    render();
  } catch(err) {
    document.getElementById('table-container').innerHTML = `
      <div class="state-box">
        <div class="icon">⚠️</div>
        <h3>Could not load standings</h3>
        <p>${err.message}</p>
      </div>`;
    document.getElementById('updated-badge').textContent = 'Error loading data';
  }
}

loadData();
</script>
</body>
</html>
